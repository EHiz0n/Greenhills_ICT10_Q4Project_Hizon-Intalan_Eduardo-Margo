<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>Skills-Test</title>
    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            color: #0b1f3a;
        }

        .navbar {
            list-style: none;
            display: flex;
            background-color: #0b1f3a;
            padding: 12px;
            margin: 0;
        }

        .navbar li {
            margin-right: 25px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            color: #4da6ff;
        }

        form {
            margin: 20px;
        }

        input, select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #0b1f3a;
            margin-top: 5px;
        }

        #output {
            margin: 20px;
            padding: 15px;
            background: #f4f6f8;
            color: #0b1f3a;
            border-radius: 8px;
            border: 1px solid #0b1f3a;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .photo {
            background: #ffffff;
            color: #0b1f3a;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #0b1f3a;
        }

        img {
            width: 100%;
            border-radius: 6px;
        }
    </style>
</head>

<body>

    <nav>
        <ul class="navbar">
            <li><a href="attendence.html">Attendance Tracker</a></li>
            <li><a href="list.html">Classmate List</a></li>
            <li><a href="photos.html">Photos Highlight</a></li>
        </ul>
    </nav>

    <form>
    <div class="mb-2">
    <label>Select Day</label>
    <select name="Day" id="Day" class="form-select">
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
    </select>
    </div>
    
    <div class="mb-2">
        <label>Absences</label>
        <input type="number" id="absences" value="0">
    </div>

    <div class="mb-2">
        <input type="button" py-click="displaying" value="Submit">
    </div>

    </form>
    
    <div id="output"></div>
    <py-script src="attendence.py"></py-script>
</body>
</html>
